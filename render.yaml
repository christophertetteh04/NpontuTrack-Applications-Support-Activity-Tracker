services:
  # PHP-FPM Application Service
  - type: web
    name: npontu-app
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free # Note: PHP-FPM may require a 'privateService' (Paid) to bypass HTTP health checks
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: "" # Set this in the Render Dashboard (e.g., Aiven host)
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""

  # Nginx Web Server Service
  - type: web
    name: npontu-web
    runtime: docker
    dockerfilePath: Dockerfile.nginx
    plan: free
    envVars:
      - key: APP_URL
        fromService:
          type: web
          name: npontu-web
          property: url
