services:
  # Public-facing Nginx Web Service
  - type: web
    name: npontu-web
    env: docker
    # Use a dedicated Dockerfile for Nginx to bake in the app.conf
    dockerfilePath: Dockerfile.nginx
    # Start Nginx in the foreground
    startCommand: "nginx -g 'daemon off;'"
    # Expose port 80 for HTTP traffic
    ports:
      - 80
    # Define public routes
    routes:
      - path: /
    # Nginx depends on the PHP-FPM app service
    dependsOn:
      - npontu-app
    envVars:
      # Render automatically provides the public URL for web services
      - key: APP_URL
        fromService:
          name: npontu-web
          property: url

  # Private PHP-FPM Application Service
  - type: worker
    name: npontu-app
    env: docker
    # Use your existing Dockerfile for the PHP-FPM application
    dockerfilePath: Dockerfile
    # Start PHP-FPM
    startCommand: "php-fpm"
    # Internal port for PHP-FPM
    port: 9000
    # Mount a persistent disk for storage (e.g., uploaded files, session data if using file driver)
    disks:
      - name: app-storage
        path: /var/www/html/storage
    envVars:
      - key: APP_KEY
        generateValue: true # Render can generate a secure APP_KEY for you
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false # Set this in the Render Dashboard for Aiven host
      - key: DB_DATABASE
        sync: false # Set this in the Render Dashboard (usually 'defaultdb')
      - key: DB_PORT
        value: "26801" # Replace with your Aiven port
      - key: DB_USERNAME
        sync: false # Set this in the Render Dashboard (usually 'avnadmin')
      - key: DB_PASSWORD
        sync: false # Set this in the Render Dashboard
