services:
  # Public-facing Nginx Web Service
  - type: web
    name: npontu-web
    env: docker
    # Use a dedicated Dockerfile for Nginx to bake in the app.conf
    dockerfilePath: Dockerfile.nginx
    # No specific build command needed if Dockerfile.nginx handles it
    buildCommand: ""
    # Start Nginx in the foreground
    startCommand: "nginx -g 'daemon off;'"
    # Expose port 80 for HTTP traffic
    ports:
      - 80
    # Define public routes
    routes:
      - path: /
    # Nginx depends on the PHP-FPM app service
    dependsOn:
      - npontu-app
    envVars:
      # Render automatically provides the public URL for web services
      - key: APP_URL
        fromService:
          name: npontu-web
          property: url

  # Private PHP-FPM Application Service
  - type: worker # Use 'worker' type for private services that don't need public HTTP access
    name: npontu-app
    env: docker
    # Use your existing Dockerfile for the PHP-FPM application
    dockerfilePath: Dockerfile
    # Install Composer dependencies during build
    buildCommand: "composer install --no-dev --prefer-dist --no-interaction --no-progress"
    # Start PHP-FPM
    startCommand: "php-fpm"
    # Mount a persistent disk for storage (e.g., uploaded files, session data if using file driver)
    disks:
      - name: app-storage
        path: /var/www/html/storage
    envVars:
      - key: APP_KEY
        generateValue: true # Render can generate a secure APP_KEY for you
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          name: npontu-db
          property: host
      - key: DB_DATABASE
        fromService:
          name: npontu-db
          property: database
      - key: DB_USERNAME
        fromService:
          name: npontu-db
          property: user
      - key: DB_PASSWORD
        fromService:
          name: npontu-db
          property: password

  # Managed MySQL Database Service
  - type: database
    name: npontu-db
    engine: mysql
    version: "8" # Specify MySQL 8
    # Allow internal Render services to connect
    ipAllowList: []
    # Persistent disk for database data
    disk:
      name: npontu-db-data
      sizeGB: 10 # Adjust size as needed for your data
```