services:
  # Unified Web Service (Nginx + PHP-FPM)
  - type: web
    name: npontu-track
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free # Note: PHP-FPM may require a 'privateService' (Paid) to bypass HTTP health checks
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: TRUSTED_PROXIES
        value: "*"
      - key: APP_URL
        value: "https://npontu-track.onrender.com" # Update this with your actual Render URL after first deploy
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: "" # Set this in the Render Dashboard (e.g., Aiven host)
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
