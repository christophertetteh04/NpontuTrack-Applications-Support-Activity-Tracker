services:
  # Unified Docker Web Service (Nginx + PHP + MariaDB)
  - type: web
    name: npontu-track
    runtime: docker
    dockerfilePath: dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        sync: false
      - key: APP_KEY
        sync: false # Set this in the Render Dashboard manually
      - key: LOG_CHANNEL
        value: stderr
      - key: TRUSTED_PROXIES
        value: "*"
      - key: APP_URL
        value: "https://npontu-track.onrender.com"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: "127.0.0.1"
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: "npontu"
      - key: DB_USERNAME
        value: "sail"
      - key: DB_PASSWORD
        value: "password"
