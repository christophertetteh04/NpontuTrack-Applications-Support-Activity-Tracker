services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: npontu-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - npontu-network
    env_file:
      - .env

  web:
    image: nginx:stable-alpine
    container_name: npontu-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - npontu-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: npontu-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-npontu}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-sail}
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql:/var/lib/mysql
    networks:
      - npontu-network

networks:
  npontu-network:
    driver: bridge
